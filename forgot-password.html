<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusWell - Reset Password</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-color: #1f2937;
            --muted-text: #6b7280;
            --primary-color: #0284c7;
            --error-bg: #ffe4e6;
            --error-text: #b91c1c;
            --success-bg: #dcfce7;
            --success-text: #15803d;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
        }

        .subtitle {
            color: var(--muted-text);
            font-size: 12px;
            text-align: center;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .msg-banner {
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
        }

        .msg-banner.error { background-color: var(--error-bg); color: var(--error-text); }
        .msg-banner.success { background-color: var(--success-bg); color: var(--success-text); }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--muted-text);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
        }

        input:focus {
            border-color: var(--primary-color);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-size: 12px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>
    <div class="subtitle" id="stepSub">Recover Account Access</div>

    <div id="msgBanner" class="msg-banner"></div>

    <!-- STAGE 1: REQUEST CODE FROM INSTITUTION EMAIL -->
    <form id="requestForm">
        <div class="form-group">
            <label>Institutional Email</label>
            <input type="email" id="resetEmail" placeholder="name@grc.edu.ph" required>
        </div>
        <button type="submit" class="submit-btn">Send Recovery Code</button>
    </form>

    <!-- STAGE 2: SUBMIT CONFIRMATION & SAVE NEW PASSWORD -->
    <form id="resetForm" class="hidden">
        <div class="form-group">
            <label>6-Digit Verification Token</label>
            <input type="text" id="verificationCode" placeholder="123456" maxlength="6" required style="text-align: center; letter-spacing: 4px; font-weight: bold;">
        </div>
        <div class="form-group">
            <label>New Secured Password</label>
            <input type="password" id="newPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="submit-btn">Update Password</button>
    </form>

    <div style="text-align: center; margin-top: 20px; font-size: 12px;">
        <button type="button" style="background: none; border: none; color: var(--muted-text); font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px;" onclick="window.location.href='login.html'">← Cancel and Return</button>
    </div>
</div>

<script>
    let capturedEmail = "";
    const banner = document.getElementById('msgBanner');

    function showMsg(msg, isSuccess = false) {
        banner.className = `msg-banner ${isSuccess ? 'success' : 'error'}`;
        banner.innerText = msg;
        banner.style.display = 'block';
    }

    // Process Form 1: Generate Code Verification Handshake Request
    document.getElementById('requestForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        banner.style.display = 'none';
        capturedEmail = document.getElementById('resetEmail').value.trim();

        try {
            const response = await fetch('http://localhost:8080/campuswell-api/forgot-password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "request", email: capturedEmail })
            });

            const data = await response.json();

            if (data.status === 'success') {
                showMsg("Verification security token deployed. Check email context.", true);
                document.getElementById('requestForm').classList.add('hidden');
                document.getElementById('resetForm').classList.remove('hidden');
                document.getElementById('stepSub').innerText = "Submit Secure Token";
            } else {
                showMsg(data.message || "Invalid account target identity.");
            }
        } catch (err) {
            showMsg("Connection failed tracking initialization handler validation.");
        }
    });

    // Process Form 2: Complete Password Override
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        banner.style.display = 'none';

        const codeVal = document.getElementById('verificationCode').value.trim();
        const passVal = document.getElementById('newPassword').value;

        try {
            const response = await fetch('http://localhost:8080/campuswell-api/forgot-password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "reset", email: capturedEmail, code: codeVal, password: passVal })
            });

            const data = await response.json();

            if (data.status === 'success') {
                showMsg("Password updated successfully! Redirecting...", true);
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                showMsg(data.message || "Token mismatch or expired condition recorded.");
            }
        } catch (err) {
            showMsg("Network connection processing exception.");
        }
    });
</script>

</body>
</html>
