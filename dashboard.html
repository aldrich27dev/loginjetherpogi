<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusWell - Dashboard</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-color: #1f2937;
            --muted-text: #6b7280;
            --primary-color: #0284c7;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--surface-color);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .welcome-badge {
            background-color: #e0f2fe;
            color: var(--primary-color);
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: var(--muted-text);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .logout-btn {
            background-color: transparent;
            color: var(--muted-text);
            border: 1px solid var(--border-color);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background-color: #f9fafb;
            color: #ef4444;
            border-color: #fca5a5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-badge">Access Authorized</div>
    <h1 id="welcomeTitle">Welcome to CampusWell</h1>
    <p>Your institutional authentication check completed successfully. You are now securely logged into your personal portal space.</p>
    
    <button class="logout-btn" onclick="logout()">Sign Out of Portal</button>
</div>

<script>
    function logout() {
        alert("Logging out safely...");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
