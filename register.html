<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusWell - Register</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --text-color: #1f2937;
            --muted-text: #6b7280;
            --primary-color: #0284c7;
            --error-bg: #ffe4e6;
            --error-text: #b91c1c;
            --success-bg: #dcfce7;
            --success-text: #15803d;
            --border-color: #e5e7eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--surface-color);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 480px;
        }

        h2 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 800;
            text-align: center;
        }

        .subtitle {
            color: var(--muted-text);
            font-size: 12px;
            text-align: center;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .msg-banner {
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
            display: none;
        }

        .msg-banner.error { background-color: var(--error-bg); color: var(--error-text); }
        .msg-banner.success { background-color: var(--success-bg); color: var(--success-text); }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: bold;
            color: var(--muted-text);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
            font-size: 14px;
            background-color: var(--surface-color);
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
        }

        /* Password Helper Checklist styling */
        .password-requirements {
            margin-top: 8px;
            padding: 10px 12px;
            background-color: #f9fafb;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .requirement {
            font-size: 11px;
            color: var(--muted-text);
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
            transition: color 0.2s ease;
        }

        .requirement:last-child {
            margin-bottom: 0;
        }

        .requirement.valid {
            color: var(--success-text);
            font-weight: bold;
        }

        .requirement .dot {
            width: 6px;
            height: 6px;
            background-color: #d1d5db;
            border-radius: 50%;
            display: inline-block;
        }

        .requirement.valid .dot {
            background-color: var(--success-text);
        }

        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
        }

        .link-btn {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
            padding: 0;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <div class="subtitle">Join CampusWell Portal</div>

    <div id="msgBanner" class="msg-banner"></div>

    <form id="registerForm">
        <div class="form-grid">
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="studentId" placeholder="2024-06-00123" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" placeholder="Dela Cruz" required>
            </div>
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" placeholder="Juan" required>
            </div>
            <div class="form-group">
                <label>Middle Name (Optional)</label>
                <input type="text" id="middleName" placeholder="Reyes">
            </div>
            <div class="form-group">
                <label>Year Level</label>
                <select id="yearLevel" required>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" id="contactNumber" placeholder="09123456789" required>
            </div>
            <div class="form-group full-width">
                <label>Institutional Email</label>
                <input type="email" id="email" placeholder="juan.delacruz@grc.edu.ph" required>
            </div>
            <div class="form-group full-width">
                <label>Account Password</label>
                <input type="password" id="password" placeholder="••••••••" 
                       minlength="8" 
                       pattern="(?=.*\d)(?=.*[A-Z])(?=.*[^A-Za-z0-9]).{8,}" 
                       title="Password must contain at least 8 characters, including 1 uppercase letter, 1 number, and 1 special character." 
                       required>
                
                <div class="password-requirements">
                    <div id="req-length" class="requirement"><span class="dot"></span> At least 8 characters</div>
                    <div id="req-uppercase" class="requirement"><span class="dot"></span> At least one uppercase letter (A-Z)</div>
                    <div id="req-number" class="requirement"><span class="dot"></span> At least one numeric digit (0-9)</div>
                    <div id="req-special" class="requirement"><span class="dot"></span> At least one special character (@, #, $, !, etc.)</div>
                </div>
            </div>
        </div>

        <button type="submit" class="submit-btn">Register Profile</button>
    </form>

    <div class="footer-links">
        <span style="color: var(--muted-text)">Already registered?</span> 
        <button type="button" class="link-btn" onclick="window.location.href='login.html'">Back to Login</button>
    </div>
</div>

<script>
    const form = document.getElementById('registerForm');
    const banner = document.getElementById('msgBanner');
    const passwordInput = document.getElementById('password');

    // Password realtime status listener checking sequence
    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        
        // Validation Checks
        const hasLength = val.length >= 8;
        const hasUppercase = /[A-Z]/.test(val);
        const hasNumber = /[0-9]/.test(val);
        const hasSpecial = /[^A-Za-z0-9]/.test(val);

        // UI Class updates
        toggleReqClass('req-length', hasLength);
        toggleReqClass('req-uppercase', hasUppercase);
        toggleReqClass('req-number', hasNumber);
        toggleReqClass('req-special', hasSpecial);
    });

    function toggleReqClass(id, isValid) {
        const element = document.getElementById(id);
        if (isValid) {
            element.classList.add('valid');
        } else {
            element.classList.remove('valid');
        }
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        banner.style.display = 'none';

        const payload = {
            studentId: document.getElementById('studentId').value.trim(),
            lastName: document.getElementById('lastName').value.trim(),
            firstName: document.getElementById('firstName').value.trim(),
            middleName: document.getElementById('middleName').value.trim(),
            yearLevel: document.getElementById('yearLevel').value,
            contactNumber: document.getElementById('contactNumber').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: passwordInput.value
        };

        try {
            const response = await fetch('http://localhost:8080/campuswell-api/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (data.status === 'success') {
                banner.className = "msg-banner success";
                banner.innerText = data.message;
                banner.style.display = 'block';
                form.reset();
                // Clear checklists styles layout after forms cleanup
                document.querySelectorAll('.requirement').forEach(el => el.classList.remove('valid'));
                setTimeout(() => { window.location.href = 'login.html'; }, 2000);
            } else {
                banner.className = "msg-banner error";
                banner.innerText = data.message || "Registration runtime error.";
                banner.style.display = 'block';
            }
        } catch (err) {
            banner.className = "msg-banner error";
            banner.innerText = "Connection failure. Verify backend execution status.";
            banner.style.display = 'block';
        }
    });
</script>

</body>
</html>
